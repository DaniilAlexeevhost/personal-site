[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Do not add SPA fallback redirects here. App Router requests must be handled by
# Netlify's Next.js/OpenNext adapter, not rewritten to an index.html file.
